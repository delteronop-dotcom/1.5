<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecos Eternos: Angeles 💌</title>
    <style>
        body, html { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; color: white; }
        #screen { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; pointer-events: auto; z-index: 20; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; opacity: 0; transition: 0.5s; }
        .stat { background: rgba(255,51,102,0.2); padding: 8px 15px; border-radius: 20px; border: 1px solid #ff3366; font-weight: bold; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; pointer-events: auto; opacity: 0; }
        #pulse-btn { width: 80px; height: 80px; border-radius: 50%; background: #ff3366; border: 4px solid white; color: white; font-weight: bold; box-shadow: 0 0 20px #ff3366; }
        canvas { display: block; }
        .btn-style { padding: 18px 45px; background: #ff3366; color: white; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.2em; box-shadow: 0 0 20px #ff3366; }
        #powerup-msg { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 1.5em; font-weight: bold; color: #ff3366; display: none; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="screen">
            <h1 id="title" style="color: #ff3366; text-shadow: 0 0 20px #ff3366;">ECOS ETERNOS</h1>
            <p id="desc">Para Angeles, mi destino.</p>
            <button id="main-btn" class="btn-style">INICIAR VIAJE</button>
            <button id="retry-btn" class="btn-style" style="display:none;">REINTENTAR</button>
        </div>
        <div id="hud">
            <div id="realm-info" style="font-weight: bold; color: #00ffff;">REINO 1</div>
            <div class="stat">💎 <span id="score">0</span> / 30</div>
        </div>
        <div id="powerup-msg"></div>
        <div id="controls"><button id="pulse-btn">PULSO</button></div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, heart, grid;
        let objects = [], score = 0, realm = 1, moveDir = 0;
        let baseSpeed = 0.55, gameSpeed = 0.55, isPaused = true;

        const REINOS = [
            { n: "FUEGO INICIAL", c: 0xff4400, bg: 0x150200 },
            { n: "MAR DE PROMESAS", c: 0x00ffff, bg: 0x000510 },
            { n: "PASIÓN PURA", c: 0xff0088, bg: 0x100005 },
            { n: "BOSQUE MÁGICO", c: 0x00ff66, bg: 0x001002 },
            { n: "VALLE DORADO", c: 0xffaa00, bg: 0x100800 },
            { n: "CIELO ETERNO", c: 0x4444ff, bg: 0x020010 },
            { n: "EL TRONO", c: 0xffffff, bg: 0x050505 }
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            grid = new THREE.GridHelper(200, 40, 0x555555, 0x555555);
            scene.add(grid);

            // Corazón Base
            const shape = new THREE.Shape();
            shape.moveTo(0, 10); shape.bezierCurveTo(10, 20, 20, 10, 20, 0); shape.bezierCurveTo(20, -10, 10, -18, 0, -28);
            shape.bezierCurveTo(-10, -18, -20, -10, -20, 0); shape.bezierCurveTo(-20, 10, -10, 20, 0, 10);
            heart = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, {depth:4, bevelEnabled:true}), new THREE.MeshPhongMaterial({color: 0xff3366, emissive: 0x220000}));
            heart.scale.set(0.045, 0.045, 0.045); heart.rotation.x = Math.PI; heart.rotation.z = Math.PI;
            scene.add(heart);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            setupControls();
            updateRealm();
            animate();
        }

        function setupControls() {
            window.addEventListener('touchstart', (e) => {
                if(e.touches[0].target.id !== 'pulse-btn') moveDir = e.touches[0].clientX < window.innerWidth/2 ? -1 : 1;
            });
            window.addEventListener('touchend', () => moveDir = 0);
            document.getElementById('pulse-btn').addEventListener('touchstart', () => {
                if(!isPaused) { heart.scale.set(0.07, 0.07, 0.07); setTimeout(() => heart.scale.set(0.045, 0.045, 0.045), 200); }
            });
        }

        function updateRealm() {
            const r = REINOS[realm-1];
            scene.background = new THREE.Color(r.bg);
            grid.material.color.setHex(r.c);
            baseSpeed = 0.55 + (realm * 0.04);
            gameSpeed = baseSpeed;
            document.getElementById('realm-info').innerText = `REINO ${realm}: ${r.n}`;
            document.getElementById('score').innerText = score;
        }

        function spawn() {
            if(isPaused) return;
            const rand = Math.random();
            let obj;
            
            if(rand < 0.18) { // DIAMANTE
                obj = new THREE.Mesh(new THREE.OctahedronGeometry(0.8), new THREE.MeshPhongMaterial({color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2}));
                obj.userData = { type: 'diamond' };
            } else if(rand < 0.38) { // OBSTÁCULO ROJO (Volvemos a frecuencia inicial, es justo)
                obj = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshPhongMaterial({color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 1}));
                obj.userData = { type: 'obstacle' };
            } else if(rand < 0.48) { // SORPRESAS DIVERTIDAS (Más escasas, 10% de aparición)
                const typeRand = Math.random();
                if(typeRand < 0.25) { // Dorado: Velocidad +20%
                    obj = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshPhongMaterial({color: 0xffff00, emissive: 0xffff00, emissiveIntensity: 2}));
                    obj.userData = { type: 'power', effect: 'speed', msg: "¡PASIÓN ACELEDA! (+20%)" };
                } else if(typeRand < 0.50) { // Azul: Ralentización (Slowmo)
                    obj = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshPhongMaterial({color: 0x0000ff, emissive: 0x0000ff, emissiveIntensity: 2}));
                    obj.userData = { type: 'power', effect: 'slow', msg: "TIEMPO PARA AMAR (Slowmo)" };
                } else if(typeRand < 0.75) { // Verde: Salto adelante
                    obj = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshPhongMaterial({color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 2}));
                    obj.userData = { type: 'power', effect: 'jump', msg: "¡UN SALTO AL DESTINO!" };
                } else { // Sombra: ¡Susto!
                    // Geometría corazón susto
                    const shape = new THREE.Shape();
                    shape.moveTo(0, 10); shape.bezierCurveTo(10, 20, 20, 10, 20, 0); shape.bezierCurveTo(20, -10, 10, -18, 0, -28);
                    shape.bezierCurveTo(-10, -18, -20, -10, -20, 0); shape.bezierCurveTo(-20, 10, -10, 20, 0, 10);
                    obj = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, {depth:4}), new THREE.MeshPhongMaterial({color: 0x111111, emissive: 0xff0000}));
                    obj.scale.set(0.04, 0.04, 0.04); obj.rotation.x = Math.PI; obj.rotation.z = Math.PI;
                    obj.userData = { type: 'power', effect: 'scare', msg: "¡AQUÍ ESTOY!" };
                }
            }

            if(obj) {
                obj.position.set((Math.random()-0.5)*13, 1.2, -60);
                scene.add(obj);
                objects.push(obj);
            }
        }

        function showPowerMsg(txt, color) {
            const m = document.getElementById('powerup-msg');
            m.innerText = txt; m.style.color = color; m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 1500);
        }

        function animate() {
            if(!isPaused) {
                requestAnimationFrame(animate);
                if(Math.random() < 0.15) spawn();

                heart.position.x += moveDir * 0.32;
                heart.position.x = Math.max(Math.min(heart.position.x, 6.5), -6.5);
                heart.rotation.y += 0.04;

                if(realm === 2) heart.position.y = 1.3 + Math.sin(Date.now() * 0.003) * 1.5;
                if(realm === 5) heart.position.x += Math.sin(Date.now() * 0.002) * 0.1;

                grid.position.z += gameSpeed;
                if(grid.position.z > 5) grid.position.z = 0;

                for(let i = objects.length-1; i>=0; i--) {
                    const o = objects[i];
                    o.position.z += gameSpeed;
                    if(o.userData.type !== 'power') o.rotation.x += 0.02;

                    if(o.position.z > -1.3 && o.position.z < 1.3 && Math.abs(o.position.x - heart.position.x) < 2) {
                        if(o.userData.type === 'diamond') {
                            score++;
                            document.getElementById('score').innerText = score;
                            if(score >= 30) { score = 0; realm++; if(realm > 7) { isPaused = true; alert("FIN DEL VIAJE: ERES MI TODO, ANGELES ❤️"); } else { updateRealm(); } }
                        } else if(o.userData.type === 'power') {
                            const e = o.userData;
                            if(e.effect === 'speed') {
                                gameSpeed = baseSpeed * 1.2; // +20%
                                showPowerMsg(e.msg, "#ffff00");
                                setTimeout(() => gameSpeed = baseSpeed, 3000);
                            } else if(e.effect === 'slow') {
                                gameSpeed = baseSpeed * 0.5; // Slowmo
                                showPowerMsg(e.msg, "#00ffff");
                                setTimeout(() => gameSpeed = baseSpeed, 5000);
                            } else if(e.effect === 'jump') {
                                objects.forEach(obj => scene.remove(obj)); // Limpiar escena
                                objects = [];
                                showPowerMsg(e.msg, "#00ff00");
                                grid.position.z += 10; // Avanzar visualmente
                            } else if(e.effect === 'scare') {
                                if(navigator.vibrate) navigator.vibrate([100, 200, 300, 200]); // Vibración fuerte susto
                                scene.background = new THREE.Color(0xff0000); // Pantalla roja susto
                                setTimeout(() => scene.background = new THREE.Color(REINOS[realm-1].bg), 100); // Volver bg
                                showPowerMsg(e.msg, "#ff0000");
                            }
                        } else {
                            // CHOQUE INMEDIATO (Se mantiene)
                            isPaused = true;
                            document.getElementById('screen').style.display = 'flex';
                            document.getElementById('title').innerText = "¡CHOQUE!";
                            document.getElementById('title').style.color = "#ff3366";
                            document.getElementById('main-btn').style.display = 'none';
                            document.getElementById('retry-btn').style.display = 'block';
                        }
                        scene.remove(o); objects.splice(i, 1);
                    }
                    if(o.position.z > 20) { scene.remove(o); objects.splice(i,1); }
                }
                renderer.render(scene, camera);
            }
        }

        document.getElementById('main-btn').addEventListener('click', () => {
            document.getElementById('screen').style.display = 'none';
            document.getElementById('hud').style.opacity = '1';
            document.getElementById('controls').style.opacity = '1';
            isPaused = false;
            init();
        });

        document.getElementById('retry-btn').addEventListener('click', () => {
            isPaused = false;
            document.getElementById('screen').style.display = 'none';
            objects.forEach(o => scene.remove(o));
            objects = [];
            heart.position.x = 0;
            animate();
        });
    </script>
</body>
</html>
